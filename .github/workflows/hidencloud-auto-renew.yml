name: HidenCloud Auto Renew

on:
  workflow_dispatch:
  schedule:
    - cron: '28 3 * * 2'  # Tue 北京时间 11:28
    - cron: '56 2 * * 4'  # Thu 北京时间 10:56
    - cron: '41 5 * * 6'  # Sat 北京时间 13:41

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            google-chrome-stable \
            unzip \
            xvfb \
            libnss3 \
            libatk-bridge2.0-0 \
            libdrm2 \
            libxkbcommon0 \
            libgbm1 \
            libasound2t64 \
            libatspi2.0-0 \
            libxshmfence1 \
            fonts-liberation

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install DrissionPage requests pysocks

      - name: Restore Browser Profile Cache
        uses: actions/cache@v4
        with:
          path: hiden_browser_profile
          key: hiden-profile-${{ github.run_id }}
          restore-keys: |
            hiden-profile-

      - name: Setup Xray Proxy
        run: |
          curl -L -o xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -o xray.zip
          chmod +x xray

          cat << 'XEOF' > config.json
          ${{ secrets.XRAY_CONFIG_JSON }}
          XEOF

          if [ ! -s config.json ]; then
            echo "❌ Error: XRAY_CONFIG_JSON is empty!"
            exit 1
          fi

          ./xray -c config.json > xray_log.txt 2>&1 &
          sleep 12

          if ps aux | grep -v grep | grep -q "./xray"; then
            echo "✅ Xray 进程运行中"
          else
            echo "❌ Xray 启动失败"
            cat xray_log.txt
            exit 1
          fi

      - name: Run Renewal Script
        env:
          ACCOUNTS:     ${{ secrets.ACCOUNTS }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:   ${{ secrets.TG_CHAT_ID }}
          PROXY:        "127.0.0.1:10808"
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" python main.py

      - name: Schedule next random run
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import random, re, json, os
          from datetime import datetime, timezone

          STATE_FILE = ".github/workflows/renew_schedule.json"
          YML_PATH   = ".github/workflows/hidencloud-auto-renew.yml"
          day_names  = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun']

          def pick_three_days():
              while True:
                  days = sorted(random.sample(range(7), 3))
                  if (days[1] - days[0]) >= 2 and (days[2] - days[1]) >= 2:
                      return days

          def make_cron(m, h, d):
              return f"{m} {h} * * {(d+1)%7}"

          def gen_schedule():
              days = pick_three_days()
              slots = []
              for d in days:
                  h = random.randint(0, 14)
                  m = random.randint(0, 59)
                  slots.append({"day": d, "h": h, "m": m, "done": False})
              return slots

          def update_yml(slots):
              with open(YML_PATH, "r") as f:
                  content = f.read()
              lines = []
              for s in slots:
                  cron = make_cron(s["m"], s["h"], s["day"])
                  bj_h = (s["h"] + 8) % 24
                  lines.append(f"    - cron: '{cron}'  # {day_names[s['day']]} 北京时间 {bj_h:02d}:{s['m']:02d}")
              new_block = "  schedule:\n" + "\n".join(lines)
              content = re.sub(
                  r"  schedule:\n(?:    - cron: '[^']*'[^\n]*\n?)+",
                  new_block + "\n",
                  content,
                  count=1
              )
              with open(YML_PATH, "w") as f:
                  f.write(content)
              print("✅ yml 已更新")

          if os.path.exists(STATE_FILE):
              with open(STATE_FILE, "r") as f:
                  state = json.load(f)
              slots = state["slots"]
          else:
              slots = None

          now_utc = datetime.now(timezone.utc)
          now_day = now_utc.weekday()

          if slots is None:
              print("📅 首次运行，生成新排期")
              slots = gen_schedule()
              update_yml(slots)
          else:
              all_done = all(s["done"] for s in slots)

              if all_done:
                  print("🔄 本轮3次全部完成，生成新排期")
                  slots = gen_schedule()
                  update_yml(slots)
              else:
                  for s in slots:
                      if not s["done"] and s["day"] == now_day:
                          s["done"] = True
                          print(f"✅ 标记 {day_names[s['day']]} {s['h']:02d}:{s['m']:02d} 已执行")
                          break
                  else:
                      for s in slots:
                          if not s["done"]:
                              s["done"] = True
                              print(f"✅ 标记 {day_names[s['day']]} {s['h']:02d}:{s['m']:02d} 已执行（按序）")
                              break

                  remaining = [s for s in slots if not s["done"]]
                  print(f"📌 剩余未执行: {len(remaining)} 次")
                  for s in remaining:
                      print(f"   {day_names[s['day']]} UTC {s['h']:02d}:{s['m']:02d}")

          with open(STATE_FILE, "w") as f:
              json.dump({"slots": slots, "updated": now_utc.isoformat()}, f, indent=2)
          print("✅ 状态已保存")
          PYEOF

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/hidencloud-auto-renew.yml .github/workflows/renew_schedule.json
          git diff --cached --quiet || git commit -m "chore: update renew schedule [skip ci]"
          git push

      - name: Upload Debug Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-logs-and-screenshots
          path: |
            *.png
            xray_log.txt
          retention-days: 3
