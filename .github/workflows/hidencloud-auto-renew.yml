name: HidenCloud Auto Renew

on:
  workflow_dispatch:
  schedule:
    # 初始默认一个时间（例如：北京时间每天 03:25，即 UTC 前一天 19:25）
    - cron: '25 19 * * *'

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # 必须使用具备 'workflow' 权限的 Personal Access Token 才能让修改后的 cron 生效
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            google-chrome-stable \
            unzip \
            xvfb \
            libnss3 \
            libatk-bridge2.0-0 \
            libdrm2 \
            libxkbcommon0 \
            libgbm1 \
            libasound2t64 \
            libatspi2.0-0 \
            libxshmfence1 \
            fonts-liberation \
            libxrender1 \
            libxtst6

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install DrissionPage requests pysocks

      - name: Restore Browser Profile Cache
        uses: actions/cache@v4
        with:
          path: hiden_browser_profile
          key: hiden-profile-${{ github.run_id }}
          restore-keys: |
            hiden-profile-

      - name: Setup Xray Proxy
        run: |
          curl -L -o xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -o xray.zip
          chmod +x xray

          cat << 'XEOF' > config.json
          ${{ secrets.XRAY_CONFIG_JSON }}
          XEOF

          if [ ! -s config.json ]; then
            echo "❌ Error: XRAY_CONFIG_JSON is empty!"
            exit 1
          fi

          ./xray -c config.json > xray_log.txt 2>&1 &
          sleep 12

          if ps aux | grep -v grep | grep -q "./xray"; then
            echo "✅ Xray 进程运行中"
          else
            echo "❌ Xray 启动失败"
            cat xray_log.txt
            exit 1
          fi

      - name: Run Renewal Script
        env:
          ACCOUNTS:     ${{ secrets.ACCOUNTS }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:   ${{ secrets.TG_CHAT_ID }}
          PROXY:        "127.0.0.1:10808"
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" python main.py

      - name: Schedule next daily random run
        if: always()
        run: |
          python3 << 'PYEOF'
          import random
          import re
          import os
          from datetime import datetime, timedelta, timezone

          YML_PATH = ".github/workflows/hidencloud-auto-renew.yml"

          # 1. 随机生成明天北京时间的 时(1-7) 和 分(0-59)
          # 注意：为了绝对安全不压线，时段设为 1 点到 7 点 59 分之间
          bj_h = random.randint(1, 7)
          bj_m = random.randint(0, 59)

          # 2. 计算对应的 UTC 时间
          # 假设明天的北京时间
          bj_tz = timezone(timedelta(hours=8))
          now_bj = datetime.now(bj_tz)
          tomorrow_bj = now_bj + timedelta(days=1)
          target_bj = tomorrow_bj.replace(hour=bj_h, minute=bj_m, second=0, microsecond=0)
          
          # 转换成 UTC
          target_utc = target_bj.astimezone(timezone.utc)
          
          cron_m = target_utc.minute
          cron_h = target_utc.hour

          # 3. 生成新的 Cron 表达式 (每天运行格式: m h * * *)
          cron_line = f"    - cron: '{cron_m} {cron_h} * * *'  # 每天随机 北京时间 {bj_h:02d}:{bj_m:02d}"
          print(f"🎲 针对应生成的明日排期：{cron_line.strip()}")

          # 4. 替换 YML 文件中的 schedule 部分
          if os.path.exists(YML_PATH):
              with open(YML_PATH, "r", encoding="utf-8") as f:
                  content = f.read()

              new_block = "  schedule:\n" + cron_line
              content = re.sub(
                  r"  schedule:\n(?:    - cron: '[^']*'[^\n]*\n?)+",
                  new_block + "\n",
                  content,
                  count=1
              )

              with open(YML_PATH, "w", encoding="utf-8") as f:
                  f.write(content)
              print("✅ YML 中的下一次 Cron 排期已成功改写")
          else:
              print(f"❌ 未找到 YML 文件: {YML_PATH}")
          PYEOF

          # 5. Git 提交并推送
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/hidencloud-auto-renew.yml
          
          if ! git diff --cached --quiet; then
            git commit -m "chore: update daily random schedule [skip ci]"
            git push
            echo "🚀 成功将明日随机时间推送到仓库"
          else
            echo "⏳ 时间巧合未改变，无需提交"
          fi

      - name: Upload Debug Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-logs-and-screenshots
          path: |
            *.png
            xray_log.txt
          retention-days: 3
